---
layout: default
---

<style>
  /* Base 98.css-like styles for the portfolio layout */
  .window-portfolio {
    max-width: 100%;
    margin: 20px auto;
    font-family: "Pixelated MS Sans Serif", Arial;
  }
  
  .window-portfolio .window-body {
    padding: 15px;
  }

  .portfolio-intro {
    background: #fff;
    box-shadow: inset -1px -1px #fff, inset 1px 1px #808080,
      inset -2px -2px #dfdfdf, inset 2px 2px #0a0a0a;
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 24px;
    padding: 12px 14px;
    text-align: center;
  }

  .portfolio-intro strong {
    color: #000080;
  }

  /* Grid Layout for Projects */
  .projects-grid {
    display: grid;
    gap: 15px;
    margin-top: 15px;
    margin-bottom: 28px;
  }

  .projects-grid--agent {
    grid-template-columns: repeat(12, minmax(0, 1fr));
  }

  .projects-grid--agent .project-card--half {
    grid-column: span 6;
  }

  .projects-grid--agent .project-card--third {
    grid-column: span 4;
  }

  .projects-grid--applied,
  .projects-grid--publications {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  /* Project Card Styling - mimicking a window or fieldset */
  .project-card {
    background: #c0c0c0;
    box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #fff,
      inset -2px -2px #808080, inset 2px 2px #dfdfdf;
    padding: 3px;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* Card Title Bar */
  .project-title-bar {
    background: #000080;
    color: #fff;
    padding: 3px 5px;
    font-weight: bold;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
    gap: 8px;
  }

  .project-status {
    background: #c0c0c0;
    box-shadow: inset -1px -1px #808080, inset 1px 1px #fff;
    color: #000;
    flex: 0 0 auto;
    font-size: 10px;
    font-weight: normal;
    line-height: 1.2;
    padding: 2px 5px;
    white-space: nowrap;
  }

  .project-status--maintained {
    background: #c0ffc0;
  }

  .project-status--beta {
    background: #ffffc0;
  }

  .project-status--prototype {
    background: #dfdfdf;
  }

  /* Card Content */
  .project-content {
    flex-grow: 1;
    padding: 10px;
    font-size: 13px;
    line-height: 1.4;
  }
  
  .project-image {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border: 2px inset #dfdfdf;
    background: #fff;
    margin-bottom: 10px;
    display: block;
  }

  .project-content ul {
    margin-top: 5px;
    margin-bottom: 5px;
    padding-left: 20px;
  }

  .project-flow {
    align-items: center;
    background: #fff;
    box-shadow: inset -1px -1px #fff, inset 1px 1px #808080,
      inset -2px -2px #dfdfdf, inset 2px 2px #0a0a0a;
    display: flex;
    flex-wrap: wrap;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    gap: 5px;
    justify-content: center;
    margin: 5px 8px 2px;
    min-height: 52px;
    padding: 9px;
  }

  .project-flow-step {
    background: #c0c0c0;
    box-shadow: inset -1px -1px #808080, inset 1px 1px #fff;
    padding: 3px 6px;
  }

  .project-flow-arrow {
    color: #000080;
    font-weight: bold;
  }

  .project-tags {
    margin-top: auto;
    padding: 8px 5px 5px;
    border-top: 1px solid #808080;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .project-tag {
    font-size: 11px;
    background: #fff;
    border: 1px solid #808080;
    padding: 2px 5px;
    box-shadow: inset 1px 1px #000;
  }
  
  /* Section headers within the portfolio content */
  h2 {
    font-size: 16px;
    font-weight: bold;
    margin-top: 25px;
    margin-bottom: 10px;
    color: #000080;
    border-bottom: 2px solid #000080;
  }

  a {
    color: #000080;
  }
  a:hover {
    text-decoration: underline;
  }

  @media (max-width: 900px) {
    .projects-grid--agent .project-card--half,
    .projects-grid--agent .project-card--third {
      grid-column: span 6;
    }
  }

  @media (max-width: 640px) {
    .portfolio-intro {
      text-align: left;
    }

    .projects-grid--agent,
    .projects-grid--applied,
    .projects-grid--publications {
      grid-template-columns: 1fr;
    }

    .projects-grid--agent .project-card--half,
    .projects-grid--agent .project-card--third {
      grid-column: 1;
    }

    .project-title-bar {
      align-items: flex-start;
    }
  }

</style>

<div id="main" role="main">
  {% include sidebar.html %}

  <article class="page h-entry" itemscope itemtype="https://schema.org/CreativeWork">
    <div class="window window-portfolio">
      <div class="title-bar">
        <div class="title-bar-text">Portfolio.exe</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize"></button>
          <button aria-label="Close"></button>
        </div>
      </div>
      <div class="window-body">
        <div class="portfolio-intro">
          <strong>I build agent systems</strong> that plan, use tools, verify their work, and operate safely around code and data. Below are those systems, followed by selected ML, data, and research work.
        </div>
        
        {{ content }}
      </div>
    </div>
  </article>
</div>
